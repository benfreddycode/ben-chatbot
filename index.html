<!DOCTYPE html>
<!-- saved from url=(0060)file:///C:/Users/bechir.benfredj_frei/Downloads/index_2.html -->
<html lang="de"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ben's Sales Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d0d0d; display: flex; justify-content: center; padding: 24px 16px; min-height: 100vh; }
  #app { width: 100%; max-width: 720px; display: flex; flex-direction: column; height: calc(100vh - 48px); background: #1a1a1a; border-radius: 12px; border: 0.5px solid #333; overflow: hidden; }
  #header { padding: 14px 20px 0; border-bottom: 0.5px solid #2e2e2e; }
  #header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  h1 { font-size: 14px; font-weight: 500; color: #ccc; }
  #lang-toggle { display: flex; gap: 4px; }
  .lang-btn { padding: 4px 10px; border-radius: 20px; border: 0.5px solid #444; background: #1a1a1a; color: #666; cursor: pointer; font-size: 12px; }
  .lang-btn.active { background: #2e2e2e; color: #eee; border-color: #666; }
  #mode-bar { display: flex; gap: 6px; padding-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { padding: 6px 13px; border-radius: 20px; border: 0.5px solid #333; background: #1a1a1a; color: #666; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .mode-btn.active { background: #2e2e2e; color: #eee; border-color: #555; font-weight: 500; }
  #mode-hint { font-size: 11px; color: #555; padding: 5px 20px 6px; background: #161616; }

  /* Chat view */
  #chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #2a2a2a; border: 0.5px solid #3a3a3a; color: #ddd; }
  .msg.assistant { align-self: flex-start; background: #222; border: 0.5px solid #333; color: #ddd; }
  .msg.loading { color: #555; font-style: italic; }
  #input-area { display: flex; gap: 8px; padding: 12px 20px; border-top: 0.5px solid #2e2e2e; align-items: flex-end; }
  #user-input { flex: 1; resize: none; min-height: 40px; max-height: 120px; padding: 9px 12px; border-radius: 8px; font-size: 14px; font-family: inherit; border: 0.5px solid #333; outline: none; background: #111; color: #ddd; }
  #user-input:focus { border-color: #555; }
  #user-input::placeholder { color: #444; }
  #send-btn { padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; height: 40px; background: #eee; color: #111; border: none; font-weight: 500; }
  #send-btn:disabled { background: #333; color: #666; cursor: default; }

  /* Inbound form view */
  #inbound-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #inbound-form { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; color: #777; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .field-input { padding: 9px 12px; border-radius: 8px; font-size: 14px; font-family: inherit; border: 0.5px solid #333; background: #111; color: #ddd; outline: none; width: 100%; }
  .field-input:focus { border-color: #555; }
  .field-input::placeholder { color: #444; }
  textarea.field-input { resize: none; min-height: 80px; }
  #inbound-actions { display: flex; gap: 8px; padding: 12px 20px; border-top: 0.5px solid #2e2e2e; }
  #generate-btn { flex: 1; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; background: #eee; color: #111; border: none; font-weight: 500; }
  #generate-btn:disabled { background: #333; color: #666; cursor: default; }
  #clear-form-btn { padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; background: transparent; color: #555; border: 0.5px solid #333; }

  /* Inbound result */
  #inbound-result { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  #result-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 0.5px solid #2e2e2e; }
  #result-header span { font-size: 12px; color: #777; }
  #back-btn { font-size: 13px; color: #888; background: transparent; border: 0.5px solid #333; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
  #result-text { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.7; color: #ddd; white-space: pre-wrap; }
  #copy-btn { margin: 0 20px 16px; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; background: #2a2a2a; color: #ccc; border: 0.5px solid #333; }
  #copy-btn:hover { background: #333; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <h1>Ben's Sales Assistant</h1>
      <div id="lang-toggle">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
    <div id="mode-bar">
      <button class="mode-btn" data-mode="research">🔍 Research</button>
      <button class="mode-btn" data-mode="outreach">✉️ Outreach</button>
      <button class="mode-btn active" data-mode="inbound">📥 Inbound</button>
      <button class="mode-btn" data-mode="internal">👥 Internal</button>
    </div>
  </div>
  <div id="mode-hint">Inbound Lead — DE</div>

  <!-- Chat view (research, outreach, internal) -->
  <div id="chat-view" style="display: none;">
    <div id="messages">
      <div class="msg assistant">Hi Ben — Modus wählen und loslegen.</div>
    </div>
    <div id="input-area">
      <textarea id="user-input" placeholder="Nachricht eingeben..." rows="1"></textarea>
      <button id="send-btn">Senden</button>
    </div>
  </div>

  <!-- Inbound form view -->
  <div id="inbound-view" style="display: flex;">
    <div id="inbound-form">
      <div class="field-group">
        <label class="field-label" id="lbl-name">Name des Prospects</label>
        <input class="field-input" id="f-name" type="text" placeholder="z.B. Thomas Müller">
      </div>
      <div class="field-group">
        <label class="field-label" id="lbl-position">Position</label>
        <input class="field-input" id="f-position" type="text" placeholder="z.B. Head of Logistics">
      </div>
      <div class="field-group">
        <label class="field-label" id="lbl-product">Interessiertes Produkt / Feature</label>
        <input class="field-input" id="f-product" type="text" placeholder="z.B. Rate Management, Booking Portal">
      </div>
      <div class="field-group">
        <label class="field-label" id="lbl-mql">MQL-Kriterien</label>
        <textarea class="field-input" id="f-mql" placeholder="z.B. 50+ Mitarbeiter, aktiver Spediteur, DACH-Markt"></textarea>
      </div>
    </div>
    <div id="inbound-actions">
      <button id="clear-form-btn">Reset</button>
      <button id="generate-btn">Generieren ✦</button>
    </div>
  </div>

  <!-- Inbound result view -->
  <div id="inbound-result" style="display: none;">
    <div id="result-header">
      <span id="result-label">Generierte Antwort</span>
      <button id="back-btn">← Felder bearbeiten</button>
    </div>
    <div id="result-text"></div>
    <button id="copy-btn">In Zwischenablage kopieren</button>
  </div>
</div>

<script>
let currentLang = 'de';
let currentMode = 'research';
let history = [];

const MODES = {
  research: {
    de: { hint: 'Research — DE', system: `Du bist ein präziser Research-Assistent für Ben, einen SaaS (Software as a Service) Sales-Profi in Barcelona mit Fokus auf den DACH-Markt (Deutschland, Österreich, Schweiz). Fasse Informationen knapp zusammen, nutze Aufzählungspunkte und hebe hervor, was im B2B-Vertriebskontext relevant ist. Veraltete Infos kennzeichnen. Kein Fülltext. Ben schätzt direkte, ehrliche Einschätzungen.` },
    en: { hint: 'Research — EN', system: `You are a sharp research assistant for Ben, a SaaS sales professional based in Barcelona focused on the DACH (Germany, Austria, Switzerland) market. Summarize concisely, use bullet points, highlight what is most relevant for a B2B sales context. Flag outdated info. No filler. Ben prefers direct, honest takes.` }
  },
  outreach: {
    de: { hint: 'Outreach Email — DE', system: `Du hilfst Ben, einem SaaS Sales-Profi mit Fokus auf den DACH-Markt, professionelle Outreach-Emails zu verfassen. Ben ist Muttersprachler Deutsch, basiert in Barcelona. Ton: professionell aber nahbar — kein steifes Kanzleideutsch, aber auch nicht zu locker. Siez-Form verwenden. Direkt und werteorientiert formulieren, keine generischen Einstiege. Fehlenden Kontext aktiv erfragen. Bei Bedarf 1-2 Varianten anbieten. Emails knackig halten.` },
    en: { hint: 'Outreach Email — EN', system: `You help Ben, a SaaS sales professional targeting the DACH market, draft outreach emails. Tone: professional but approachable. Be direct and value-focused, no generic openers. Ask for missing context if needed. Offer 1-2 variants when appropriate. Keep emails concise.` }
  },
  internal: {
    de: { hint: 'Internal Email — DE', system: `Du hilfst Ben, interne Emails an Kollegen, Manager und Ops-Teams zu verfassen. Struktur: Kontext, Anfrage oder Update, nächste Schritte. Ton: direkt und professionell, aber nicht förmlich steif. Kein Fülltext. Wenn eine Slack-Nachricht sinnvoller wäre, kurz darauf hinweisen.` },
    en: { hint: 'Internal Email — EN', system: `You help Ben draft internal emails to colleagues, managers and ops teams. Structure: context, ask or update, next steps. Tone: direct and professional, not stiff. No padding. Flag if Slack would be more appropriate.` }
  }
};

const INBOUND_SYSTEM = {
  de: `Du hilfst Ben, einem Sales-Profi bei Freightos (eine Freight-Technology-Plattform), professionelle Antworten auf eingehende Leads zu verfassen. Freightos hilft Spediteuren und Verladern, Frachtpreise zu vergleichen, zu buchen und zu verwalten. Ton: professionell aber menschlich — nicht wie eine automatische Antwort, sondern wie ein kompetenter, sympathischer Ansprechpartner. Siez-Form. Die Antwort soll: 1) den Kontakt namentlich ansprechen, 2) das Interesse bestätigen und kurz den Mehrwert von Freightos für ihre spezifische Situation verdeutlichen, 3) immer konkret einen Call oder eine Demo als nächsten Schritt vorschlagen mit einer klaren Handlungsaufforderung. Antwort auf Deutsch verfassen.`,
  en: `You help Ben, a sales professional at Freightos (a freight technology platform), respond to inbound leads. Freightos helps freight forwarders and shippers compare, book and manage freight rates. Tone: professional but human — not like an automated reply. The response must: 1) address the contact by name, 2) acknowledge their interest and briefly highlight Freightos value for their specific situation, 3) always propose a call or demo as the next step with a clear call to action. Write the response in English.`
};

const FIELD_LABELS = {
  de: { name: 'Name des Prospects', position: 'Position', product: 'Interessiertes Produkt / Feature', mql: 'MQL-Kriterien', generate: 'Generieren ✦', result: 'Generierte Antwort', copy: 'In Zwischenablage kopieren', back: '← Felder bearbeiten', placeholder_name: 'z.B. Thomas Müller', placeholder_position: 'z.B. Head of Logistics', placeholder_product: 'z.B. Rate Management, Booking Portal', placeholder_mql: 'z.B. 50+ Mitarbeiter, aktiver Spediteur, DACH-Markt' },
  en: { name: 'Prospect Name', position: 'Position', product: 'Interested Product / Feature', mql: 'MQL Criteria', generate: 'Generate ✦', result: 'Generated response', copy: 'Copy to clipboard', back: '← Edit fields', placeholder_name: 'e.g. Thomas Müller', placeholder_position: 'e.g. Head of Logistics', placeholder_product: 'e.g. Rate Management, Booking Portal', placeholder_mql: 'e.g. 50+ employees, active freight forwarder, DACH market' }
};

const UI = {
  de: { placeholder: 'Nachricht eingeben...', send: 'Senden', loading: 'Wird verarbeitet...', greeting: 'Hi Ben — Modus wählen und loslegen.' },
  en: { placeholder: 'Type your message...', send: 'Send', loading: 'Thinking...', greeting: 'Hi Ben — pick a mode and get started.' }
};

function updateHint() {
  if (currentMode === 'inbound') {
    document.getElementById('mode-hint').textContent = 'Inbound Lead — ' + currentLang.toUpperCase();
  } else {
    document.getElementById('mode-hint').textContent = MODES[currentMode][currentLang].hint;
  }
}

function updateFieldLabels() {
  const L = FIELD_LABELS[currentLang];
  document.getElementById('lbl-name').textContent = L.name;
  document.getElementById('lbl-position').textContent = L.position;
  document.getElementById('lbl-product').textContent = L.product;
  document.getElementById('lbl-mql').textContent = L.mql;
  document.getElementById('generate-btn').textContent = L.generate;
  document.getElementById('result-label').textContent = L.result;
  document.getElementById('copy-btn').textContent = L.copy;
  document.getElementById('back-btn').textContent = L.back;
  document.getElementById('f-name').placeholder = L.placeholder_name;
  document.getElementById('f-position').placeholder = L.placeholder_position;
  document.getElementById('f-product').placeholder = L.placeholder_product;
  document.getElementById('f-mql').placeholder = L.placeholder_mql;
}

function showView(mode) {
  const chatView = document.getElementById('chat-view');
  const inboundView = document.getElementById('inbound-view');
  const inboundResult = document.getElementById('inbound-result');
  if (mode === 'inbound') {
    chatView.style.display = 'none';
    inboundResult.style.display = 'none';
    inboundView.style.display = 'flex';
  } else {
    chatView.style.display = 'flex';
    inboundView.style.display = 'none';
    inboundResult.style.display = 'none';
  }
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    document.getElementById('user-input').placeholder = UI[currentLang].placeholder;
    document.getElementById('send-btn').textContent = UI[currentLang].send;
    updateHint();
    updateFieldLabels();
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    history = [];
    updateHint();
    showView(currentMode);
  });
});

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('inbound-result').style.display = 'none';
  document.getElementById('inbound-view').style.display = 'flex';
});

document.getElementById('clear-form-btn').addEventListener('click', () => {
  document.getElementById('f-name').value = '';
  document.getElementById('f-position').value = '';
  document.getElementById('f-product').value = '';
  document.getElementById('f-mql').value = '';
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    const original = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = original, 2000);
  });
});

document.getElementById('generate-btn').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  const position = document.getElementById('f-position').value.trim();
  const product = document.getElementById('f-product').value.trim();
  const mql = document.getElementById('f-mql').value.trim();

  if (!name && !product) {
    alert(currentLang === 'de' ? 'Bitte mindestens Name und Produkt ausfüllen.' : 'Please fill in at least name and product.');
    return;
  }

  const prompt = currentLang === 'de'
    ? `Prospect: ${name || 'unbekannt'}\nPosition: ${position || 'unbekannt'}\nInteressiertes Produkt/Feature: ${product || 'unbekannt'}\nMQL-Kriterien: ${mql || 'keine Angabe'}\n\nBitte verfasse eine professionelle Antwort-Email auf diesen Inbound Lead.`
    : `Prospect: ${name || 'unknown'}\nPosition: ${position || 'unknown'}\nInterested Product/Feature: ${product || 'unknown'}\nMQL Criteria: ${mql || 'not specified'}\n\nPlease draft a professional response email for this inbound lead.`;

  document.getElementById('generate-btn').disabled = true;
  document.getElementById('generate-btn').textContent = currentLang === 'de' ? 'Wird generiert...' : 'Generating...';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: INBOUND_SYSTEM[currentLang],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'No response received.';
    document.getElementById('result-text').textContent = reply;
    document.getElementById('inbound-view').style.display = 'none';
    document.getElementById('inbound-result').style.display = 'flex';
  } catch(e) {
    alert(currentLang === 'de' ? 'Fehler: API nicht erreichbar.' : 'Error: could not reach the API.');
  }

  const L = FIELD_LABELS[currentLang];
  document.getElementById('generate-btn').disabled = false;
  document.getElementById('generate-btn').textContent = L.generate;
});

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('send-btn').addEventListener('click', sendMessage);

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 99999;
  return el;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const loadingEl = addMsg('assistant loading', UI[currentLang].loading);
  document.getElementById('send-btn').disabled = true;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: MODES[currentMode][currentLang].system,
        messages: history
      })
    });
    const data = await resp.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'No response received.';
    loadingEl.classList.remove('loading');
    loadingEl.textContent = reply;
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    loadingEl.classList.remove('loading');
    loadingEl.textContent = currentLang === 'de' ? 'Fehler: API nicht erreichbar.' : 'Error: could not reach the API.';
  }
  document.getElementById('send-btn').disabled = false;
}

updateFieldLabels();
</script>


</body></html>
