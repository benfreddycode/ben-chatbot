<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ben's Sales Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; display: flex; justify-content: center; padding: 24px 16px; min-height: 100vh; }
  #app { width: 100%; max-width: 720px; display: flex; flex-direction: column; height: calc(100vh - 48px); background: #fff; border-radius: 12px; border: 0.5px solid #ddd; overflow: hidden; }
  #header { padding: 16px 20px 0; border-bottom: 0.5px solid #e5e5e5; }
  h1 { font-size: 15px; font-weight: 500; color: #111; margin-bottom: 12px; }
  #mode-bar { display: flex; gap: 8px; padding-bottom: 12px; }
  .mode-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; font-size: 13px; }
  .mode-btn.active { background: #f0f0ee; color: #111; border-color: #999; font-weight: 500; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #f0f0ee; border: 0.5px solid #ddd; }
  .msg.assistant { align-self: flex-start; background: #fff; border: 0.5px solid #ddd; }
  .msg.loading { color: #999; font-style: italic; }
  #input-area { display: flex; gap: 8px; padding: 12px 20px; border-top: 0.5px solid #e5e5e5; align-items: flex-end; }
  #user-input { flex: 1; resize: none; min-height: 40px; max-height: 120px; padding: 9px 12px; border-radius: 8px; font-size: 14px; font-family: inherit; border: 0.5px solid #ccc; outline: none; }
  #user-input:focus { border-color: #999; }
  #send-btn { padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; height: 40px; background: #111; color: #fff; border: none; }
  #send-btn:disabled { background: #ccc; cursor: default; }
  #mode-hint { font-size: 11px; color: #999; padding: 4px 20px 8px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>Ben's Sales Assistant</h1>
    <div id="mode-bar">
      <button class="mode-btn active" data-mode="research">🔍 Research</button>
      <button class="mode-btn" data-mode="outreach">✉️ Outreach email</button>
      <button class="mode-btn" data-mode="internal">👥 Internal email</button>
    </div>
  </div>
  <div id="mode-hint">Research mode active</div>
  <div id="messages">
    <div class="msg assistant">Hi Ben — pick a mode above and tell me what you need.</div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const MODES = {
  research: {
    label: "Research mode active",
    system: `You are a sharp research assistant for Ben, a SaaS (Software as a Service) sales professional based in Barcelona focused on the DACH (Germany, Austria, Switzerland) market. Summarize concisely, use bullet points, highlight what is most relevant for a B2B (Business to Business) sales context. Flag outdated info. Be direct, no filler. Ben prefers honest takes over sugarcoating.`
  },
  outreach: {
    label: "Outreach email mode active",
    system: `You are an expert B2B (Business to Business) sales email writer helping Ben, a SaaS (Software as a Service) sales professional targeting the DACH (Germany, Austria, Switzerland) market. Ben is a native German speaker based in Barcelona. Default to German for DACH prospects unless told otherwise. Use formal Sie address. Be direct and value-focused, no generic intros. Ask for missing context (company, pain point, product) if needed. Offer 1-2 variants with different angles when appropriate. Keep emails concise and punchy (knackig).`
  },
  internal: {
    label: "Internal email mode active",
    system: `You are helping Ben, a SaaS (Software as a Service) sales professional, draft clear internal emails to managers, colleagues, and ops teams. Structure: context, ask or update, next steps. Keep tone professional but direct. No padding, no over-politeness. Flag if a Slack message would be more appropriate than an email.`
  }
};

let currentMode = 'research';
let history = [];

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    document.getElementById('mode-hint').textContent = MODES[currentMode].label;
  });
});

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('send-btn').addEventListener('click', sendMessage);

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 99999;
  return el;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const loadingEl = addMsg('assistant loading', 'Thinking...');
  document.getElementById('send-btn').disabled = true;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: MODES[currentMode].system,
        messages: history
      })
    });
    const data = await resp.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'No response received.';
    loadingEl.classList.remove('loading');
    loadingEl.textContent = reply;
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    loadingEl.classList.remove('loading');
    loadingEl.textContent = 'Error: could not reach the API. Check your internet connection and try again.';
  }

  document.getElementById('send-btn').disabled = false;
}
</script>


</body></html>
